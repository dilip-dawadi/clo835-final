<!doctype html>
<title>Hello from Flask</title>
<body
  style="
            background: {{ color }};   
            height: 100vh;          
            {% if background_image %}
            background-image: url('{{ background_image }}');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            {% endif %}"
></body>
<div
  style="
    color: #e4e4e4;
    text-align: center;
    height: 90px;
    vertical-align: middle;
  "
>
  {% if my_name %}
  <h1>Hello from {{ my_name }}!</h1>
  {% else %}
  <h1>Hello From CLO835!</h1>
  {% endif %} {% if contents %}
  <textarea rows="10" cols="50">
    {{ contents }}
  </textarea>
  {% endif %}
</div>
