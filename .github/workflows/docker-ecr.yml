name: Build and Push Docker Images

on:
  push:
    branches: [master]

env:
  IMAGE_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./clo835-app/app/requirements.txt

      - name: Run App Smoke Tests
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "./clo835-app/app")
          import app as app_module

          client = app_module.app.test_client()
          home = client.get("/")
          about = client.get("/about")

          assert home.status_code == 200, "Home route failed"
          assert about.status_code == 200, "About route failed"
          assert b"Employee Database" in home.data, "Home content mismatch"
          assert b"Hello" in about.data, "About content mismatch"
          print("Smoke tests passed")
          PY

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login \
            --username AWS \
            --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build & Push Web App
        run: |
          docker build -t clo835-webapp:${{ env.IMAGE_TAG }} ./clo835-app/app
          docker tag clo835-webapp:${{ env.IMAGE_TAG }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clo835-webapp:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clo835-webapp:${{ env.IMAGE_TAG }}

      - name: Build & Push MySQL
        run: |
          docker build -t clo835-mysql:${{ env.IMAGE_TAG }} ./clo835-app/mysql
          docker tag clo835-mysql:${{ env.IMAGE_TAG }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clo835-mysql:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clo835-mysql:${{ env.IMAGE_TAG }}
