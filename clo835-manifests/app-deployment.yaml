apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: final
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      serviceAccountName: app-sa
      containers:
        - name: webapp
          image: 677868816391.dkr.ecr.us-east-1.amazonaws.com/clo835-webapp:v2
          ports:
            - containerPort: 81
          env:
            - name: DBHOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DBHOST
            - name: DBPORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DBPORT
            - name: DBUSER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DBUSER
            - name: DBPWD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DBPWD
            - name: DATABASE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DATABASE
            - name: APP_COLOR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_COLOR
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AWS_REGION
            - name: MY_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MY_NAME
            - name: BG_IMAGE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BG_IMAGE_URL
