apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: final
  name: app-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rolebinding
  namespace: final
subjects:
  - kind: ServiceAccount
    name: app-sa
    namespace: final
roleRef:
  kind: Role
  name: app-role
  apiGroup: rbac.authorization.k8s.io
