<!doctype html>
<html>
  <head>
    <title>Add Employee Information</title>
  </head>
  <center>
    <font color="black" size="4" style="font-family: avenir">
      <body
        style="
            background: {{ color }};
            {% if background_image %}
            background-image: url('{{ background_image }}');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            {% endif %}
        "
      >
        <h1 style="color: DodgerBlue">Employee Database</h1>
        <h2 style="color: white">{{ my_name }} - CLO835 Final Project</h2>

        <form
          action="/addemp"
          autocomplete="on"
          method="POST"
          enctype="multipart/form-data"
        >
          Employee ID:<br />
          <input
            style="height: 25px; font-size: 14pt; color: grey"
            type="number"
            name="emp_id"
            autofocus
            size="40"
          /><br /><br />

          First Name:<br />
          <input
            style="height: 25px; font-size: 14pt; color: grey"
            type="text"
            name="first_name"
          /><br /><br />

          Last Name:<br />
          <input
            style="height: 25px; font-size: 14pt; color: grey"
            type="text"
            name="last_name"
          /><br /><br />

          Primary Skills:<br />
          <input
            style="height: 25px; font-size: 14pt; color: grey"
            type="text"
            name="primary_skill"
          /><br /><br />

          Location:<br />
          <input
            style="height: 25px; font-size: 14pt; color: grey"
            type="text"
            name="location"
          /><br /><br />

          <button
            type="submit"
            style="background: grey; height: 45px; width: 200px; color: white"
          >
            UPDATE DATABASE</button
          ><br /><br />
          <button
            type="submit"
            formaction="/getemp"
            style="background: grey; height: 45px; width: 200px; color: white"
          >
            GET EMPLOYEE INFORMATION</button
          ><br /><br />
        </form>

        <br /><br /><br /><br />
        <a href="/about">About Us</a>
      </body>
    </font>
  </center>
</html>
